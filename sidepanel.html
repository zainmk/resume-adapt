<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ResumeAdapt</title>
  <link rel="icon" type="image/png" href="assets/resume-adapt-logo.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="panel">
  <main>
    <header class="row spread">
      <div class="brand-title">
        <span class="brand-logo" aria-hidden="true"><img src="assets/resume-adapt-logo.png" alt=""></span>
        <h1>ResumeAdapt</h1>
      </div>
      <button id="settings-link" class="icon-btn" type="button" title="Settings" aria-label="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <div id="setup-notice" class="notice" hidden>
      <p id="setup-text"></p>
      <button id="open-settings-btn" type="button">Open Settings</button>
    </div>

    <div id="main-flow">
      <section>
        <h2>Job description</h2>
        <textarea id="jd-input" rows="9" placeholder="Paste the job description here&hellip;" spellcheck="false"></textarea>
      </section>

      <div class="row">
        <button id="generate-btn" class="primary" type="button">Generate</button>
        <span id="gen-status" class="status"></span>
      </div>

      <p id="error-box" class="error" hidden></p>

      <section id="result-section" hidden>
        <div class="row spread">
          <h2>Preview</h2>
          <button id="regenerate-btn" class="link-btn" type="button">Regenerate</button>
        </div>
        <div id="match-box" class="match" hidden></div>
        <p class="hint">Click any text to edit &mdash; changes save automatically and are included in the downloads. Blue titles open their link. Regenerate replaces your edits.</p>
        <div id="preview" class="preview"></div>
        <div class="row downloads">
          <button id="dl-docx-btn" class="primary" type="button">Download .docx</button>
        </div>
      </section>
    </div>
  </main>

  <script src="lib/docx.min.js"></script>
  <script src="prompts.js"></script>
  <script src="shared.js"></script>
  <script src="render-docx.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
